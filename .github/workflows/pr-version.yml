name: PR Version

# Calcula a próxima versão (sem criar a tag) e a adiciona como prefixo
# ao título do PR — ex: "[v1.2.0-dev.3] feat: adiciona suporte a SNS"
#
# O prefixo é recalculado a cada push na branch do PR para refletir
# eventuais mudanças no bump (ex: um novo "feat:" eleva minor).

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  prefix-version:
    name: Prefix PR title with next version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version (dry run)
        id: next
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          pre_release_branches: dev
          default_bump: patch
          tag_prefix: v
          dry_run: true

      - name: Update PR title
        uses: actions/github-script@v7
        with:
          script: |
            const newTag   = '${{ steps.next.outputs.new_tag }}';
            const pr       = context.payload.pull_request;
            const current  = pr.title;

            // Remove prefixo de versão existente antes de reescrever.
            const clean    = current.replace(/^\[v\d+\.\d+\.\d+(-[\w.]+)?\]\s*/, '');
            const proposed = `[${newTag}] ${clean}`;

            if (current === proposed) return;

            await github.rest.pulls.update({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: pr.number,
              title:       proposed,
            });
            core.info(`Title updated: ${proposed}`);

  # ── Validação e auto-preenchimento do template ───────────────────────────
  fill-template:
    name: Fill PR template
    runs-on: ubuntu-latest
    steps:
      - name: Check and fill template
        uses: actions/github-script@v7
        with:
          script: |
            const pr     = context.payload.pull_request;
            const number = pr.number;
            const body   = pr.body || '';

            // ── Helpers ──────────────────────────────────────────────────

            // Retorna o texto entre um cabeçalho de seção e o próximo.
            function extractSection(text, header) {
              const re = new RegExp(
                `## ${header}\\s*\\n([\\s\\S]*?)(?=\\n##\\s|<!-- CI_TEST_STATUS -->|$)`,
              );
              const m = text.match(re);
              return m ? m[1].trim() : null;
            }

            // Seção vazia = nula, só espaços, ou apenas comentários HTML.
            function isEmpty(text) {
              if (!text) return true;
              return text.replace(/<!--[\s\S]*?-->/g, '').trim() === '';
            }

            // ── Verificar se o template está presente e preenchido ────────

            const hasSections =
              body.includes('## O que foi alterado') &&
              body.includes('## Breaking changes')   &&
              body.includes('## Checklist')          &&
              body.includes('<!-- CI_TEST_STATUS -->');

            const changesFilled = !isEmpty(extractSection(body, 'O que foi alterado'));

            if (hasSections && changesFilled) {
              core.info('Template OK — nenhuma ação necessária.');
              return;
            }

            // ── Buscar commits do PR ──────────────────────────────────────

            const { data: commits } = await github.rest.pulls.listCommits({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: number,
              per_page:    100,
            });

            const commitLines = commits.map(c => {
              const sha = c.sha.slice(0, 7);
              const msg = c.commit.message.split('\n')[0];
              return `- ${msg} (\`${sha}\`)`;
            });

            // ── Detectar breaking changes ─────────────────────────────────

            const breakingRe   = /^[a-z]+(\([^)]+\))?!:|BREAKING[- ]CHANGE/im;
            const breakingHits = commits
              .filter(c => breakingRe.test(c.commit.message))
              .map(c => `- \`${c.sha.slice(0, 7)}\` ${c.commit.message.split('\n')[0]}`);

            const hasBreaking      = breakingHits.length > 0;
            const breakingCheckbox = hasBreaking ? '- [x]' : '- [ ]';
            const breakingDetail   = hasBreaking
              ? '\n\n**Breaking changes detectados automaticamente:**\n' + breakingHits.join('\n')
              : '\n\n<!-- Se marcado, descreva o impacto e o caminho de migração necessário. -->';

            // ── Construir novo body ───────────────────────────────────────

            let newBody;

            if (hasSections && !changesFilled) {
              // Template presente mas "O que foi alterado" vazia:
              // substitui apenas essa seção, preserva o resto.
              newBody = body.replace(
                /## O que foi alterado[\s\S]*?(?=## Breaking changes)/,
                `## O que foi alterado\n\n${commitLines.join('\n')}\n\n`,
              );
            } else {
              // Template ausente ou body vazio: reconstrói do zero.
              newBody = [
                '## O que foi alterado',
                '',
                commitLines.join('\n'),
                '',
                '## Breaking changes',
                '',
                `${breakingCheckbox} Esta PR contém breaking changes`,
                breakingDetail,
                '',
                '## Checklist',
                '',
                '- [ ] Testes adicionados ou atualizados',
                '- [ ] Documentação atualizada (`README`, `docs/`)',
                '- [ ] Commits seguem [Conventional Commits](https://www.conventionalcommits.org) (`feat:`, `fix:`, `feat!:` etc.)',
                '',
                '---',
                '',
                '## Status dos testes',
                '',
                '<!-- CI_TEST_STATUS -->',
                '> ⏳ Aguardando execução do CI...',
                '<!-- /CI_TEST_STATUS -->',
              ].join('\n');
            }

            await github.rest.pulls.update({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: number,
              body:        newBody,
            });

            // ── Notificar autor (apenas na abertura do PR) ────────────────

            if (context.payload.action === 'opened') {
              const what = [];
              if (!hasSections)   what.push('o template de PR foi aplicado');
              if (!changesFilled) what.push('"O que foi alterado" foi preenchido com a lista de commits');
              if (hasBreaking)    what.push('"Breaking changes" foi marcado automaticamente');

              const notice = [
                '> [!NOTE]',
                '> **O body desta PR foi preenchido automaticamente:**',
                ...what.map(w => `> - ${w}`),
                '>',
                '> Revise o conteúdo e ajuste o que for necessário antes do merge.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: number,
                body:         notice,
              });
            }

            core.warning('Template auto-preenchido — autor deve revisar.');
