name: Release

# ─── Triggers ────────────────────────────────────────────────────────────────
#
#  auto-tag     push para dev (merge de PR)
#               → cria tag v X.Y.Z-dev.N  →  dispara o job release abaixo
#
#  auto-tag     push para main (merge de PR de dev)
#               → cria tag vX.Y.Z  →  dispara o job release abaixo
#
#  release      push de tag v* (criado pelo job de auto-tag acima)
#               → goreleaser full build
#               → prerelease=auto: sufixo "-dev.N" → pre-release, sem sufixo → release estável
#
on:
  push:
    branches: [dev, main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── Auto-tag ─────────────────────────────────────────────────────────────
  # Roda apenas em pushes de branch (merge de PR).
  # Lê os commits convencionais desde a última tag para calcular o bump,
  # cria a tag e a empurra — isso dispara este mesmo workflow novamente
  # com ref_type == 'tag', executando o job 'release' abaixo.
  auto-tag:
    name: Auto-tag
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          # main  → tag estável:    vX.Y.Z
          # dev   → tag pre-release: vX.Y.Z-dev.N
          release_branches: main
          pre_release_branches: dev
          # bump padrão quando não há conventional commits reconhecíveis
          default_bump: patch
          tag_prefix: v

  # ── Build & publish ───────────────────────────────────────────────────────
  # Roda apenas em pushes de tag (criados pelo job auto-tag acima ou manualmente).
  # goreleaser usa prerelease: auto — tag com sufixo vira pre-release,
  # tag limpa (vX.Y.Z) vira release estável.
  release:
    name: >-
      ${{
        contains(github.ref_name, '-') && 'pre-release' || 'release'
      }}
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -race -count=1

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
