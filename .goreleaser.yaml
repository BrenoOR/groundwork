version: 2

project_name: groundwork

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: groundwork
    main: ./cmd/groundwork
    binary: groundwork
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: groundwork
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  # Version string used for dev (--snapshot) builds.
  version_template: "0.0.0-dev.{{.ShortCommit}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: groundwork-dev
    name: groundwork
  # "auto" marks the release as pre-release when the tag contains a suffix
  # (e.g. v1.0.0-rc.1, v1.0.0-beta.1). Stable tags (v1.0.0) become full releases.
  prerelease: auto
  name_template: "v{{.Version}}"