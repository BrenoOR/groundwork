version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - gosimple
    - ineffassign
    - unused
    - gocritic
    - misspell

linters-settings:
  govet:
    enable-all: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style

issues:
  max-same-issues: 0
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck